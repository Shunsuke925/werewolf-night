<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Werewolf Night</title>
<style>
  :root{
    --bg:#120F24; --bg2:#1A1636; --card:#221E45; --card2:#2C2756; --line:#3a356b;
    --red:#FF5D5D; --teal:#3ED9C4; --gold:#FFC83D; --purple:#B8A6FF;
    --lav:#D8D5F5; --muted:#9A96C9; --white:#fff;
    --gold-t:#FFC83D; --silver-t:#C7CBD8; --bronze-t:#E08A5B;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:radial-gradient(circle at 20% 0%, rgba(184,166,255,.14), transparent 42%),
               radial-gradient(circle at 85% 100%, rgba(255,93,93,.12), transparent 44%), var(--bg);
    color:var(--lav); font-family:"Segoe UI",system-ui,sans-serif; min-height:100%;
    display:flex; flex-direction:column; align-items:center; padding:max(3vh,16px) 16px 80px;
  }
  .wrap{width:100%; max-width:560px;}
  h1{font-family:Georgia,serif; color:#fff; text-align:center; font-size:2.3rem; line-height:1.05;}
  .moon{font-size:2.1rem; display:block; text-align:center; margin-bottom:.2rem;}
  .tag{color:var(--gold); text-align:center; letter-spacing:.26em; text-transform:uppercase; font-size:.78rem; font-weight:800; margin-bottom:1.4rem;}
  .hidden{display:none !important;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; margin-bottom:14px; box-shadow:0 10px 30px rgba(0,0,0,.3);}
  label{display:block; font-size:.85rem; color:var(--muted); margin-bottom:6px; font-weight:600;}
  input{width:100%; background:var(--bg2); color:#fff; border:2px solid var(--line); border-radius:12px; padding:14px 16px; font-size:1.1rem; font-family:inherit;}
  input:focus{outline:none; border-color:var(--purple);}

  .btn{display:block; width:100%; cursor:pointer; border:none; border-radius:14px; padding:15px; font-family:Georgia,serif; font-weight:bold; font-size:1.15rem; transition:.15s; margin-top:8px;}
  .btn.primary{background:linear-gradient(180deg,#C7B5FF,#9B7BFF); color:#15122b; box-shadow:0 8px 22px rgba(155,123,255,.35);}
  .btn.gold{background:linear-gradient(180deg,#FFD45A,#FFB81F); color:#1a1530; box-shadow:0 8px 22px rgba(255,184,31,.32);}
  .btn.red{background:linear-gradient(180deg,#FF7B7B,#F0454F); color:#fff;}
  .btn.ghost{background:transparent; border:2px solid var(--line); color:var(--lav); font-family:"Segoe UI",sans-serif; font-size:1rem;}
  .btn:active{transform:translateY(1px);} .btn:disabled{opacity:.45; cursor:default;}
  .btn.sm{padding:10px; font-size:.95rem; border-radius:10px;}
  .row{display:flex; gap:10px;} .row>*{flex:1;}

  .info-btns{display:flex; gap:10px; margin-top:4px;}
  .info-btns button{flex:1; background:var(--card2); border:1px solid var(--line); color:var(--lav); border-radius:12px; padding:12px; font-size:.98rem; cursor:pointer; font-weight:600;}
  .info-btns button:active{transform:translateY(1px);}
  .muted{color:var(--muted); font-size:.92rem; line-height:1.5;} .center{text-align:center;}
  .pill{display:inline-block; padding:4px 11px; border-radius:20px; font-size:.78rem; font-weight:700;}
  .banner{background:var(--card2); border:1px dashed var(--line); border-radius:12px; padding:11px 13px; font-size:.9rem; color:var(--gold); text-align:center; margin-bottom:12px;}

  /* phase stage */
  .phase-head{text-align:center; margin-bottom:12px;}
  .phase-kicker{letter-spacing:.22em; text-transform:uppercase; font-weight:800; font-size:.8rem;}
  .phase-title{font-family:Georgia,serif; color:#fff; font-size:1.7rem; margin-top:3px;}
  .clock{display:inline-flex; align-items:center; gap:7px; margin-top:10px; background:var(--card2); border:1px solid var(--line); border-radius:30px; padding:6px 16px; font-weight:800; font-size:1.2rem; color:var(--gold); font-variant-numeric:tabular-nums;}
  .clock.low{color:var(--red); border-color:var(--red);}
  .night{--accent:#8d86ff;} .day{--accent:var(--gold);}

  .pick{display:flex; justify-content:space-between; align-items:center; width:100%; text-align:left; background:var(--bg2); border:2px solid var(--line); color:#fff; border-radius:12px; padding:14px 16px; font-size:1.1rem; font-weight:600; margin-bottom:9px; cursor:pointer; font-family:inherit;}
  .pick:active{transform:translateY(1px);}
  .pick.sel{border-color:var(--accent,var(--purple)); background:rgba(141,134,255,.16); box-shadow:0 0 0 3px rgba(141,134,255,.12);}
  .pick .cnt{font-size:.8rem; color:var(--red); font-weight:800;}
  .picktip{font-size:.85rem; color:var(--muted); text-align:center; margin-top:4px;}

  .nightwait{text-align:center; padding:30px 16px;}
  .nightwait .big{font-size:3.4rem; margin-bottom:8px;}
  .nightwait .z{font-size:1.3rem; color:var(--lav); font-family:Georgia,serif;}
  .pulse{animation:pulse 1.8s ease-in-out infinite;} @keyframes pulse{0%,100%{opacity:.45;}50%{opacity:1;}}

  .resultbox{text-align:center; padding:22px 16px;}
  .resultbox .em{font-size:3.2rem;} .resultbox .h{font-family:Georgia,serif; color:#fff; font-size:1.5rem; margin:6px 0;}
  .seer-yes{color:var(--red);} .seer-no{color:var(--teal);}

  .role-mini{display:inline-flex; align-items:center; gap:8px; background:var(--card2); border:1px solid var(--line); border-radius:30px; padding:7px 16px; font-family:Georgia,serif; font-weight:bold; color:#fff; font-size:1.05rem;}
  .pack{font-size:.92rem; color:var(--red); text-align:center; margin-bottom:12px; font-weight:700;}
  .deadtag{display:inline-block; background:rgba(255,93,93,.15); color:var(--red); border:1px solid var(--red); border-radius:30px; padding:6px 16px; font-weight:800; letter-spacing:.04em;}

  .winbox{text-align:center; padding:26px 18px;}
  .winbox .trophy{font-size:4rem;} .winbox .ttl{font-family:Georgia,serif; color:#fff; font-size:2rem; margin:6px 0 4px;}
  .tier-badge{display:inline-flex; align-items:center; gap:7px; font-family:Georgia,serif; font-weight:bold; font-size:1.1rem; padding:7px 16px; border-radius:30px; border:2px solid;}

  /* host monitor */
  .mtable{margin-bottom:12px;} .mtable .mh{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .mtable .mt{font-family:Georgia,serif; font-weight:bold; font-size:1.2rem;}
  .mphase{font-size:.92rem; color:var(--lav);}
  .mmeta{display:flex; justify-content:space-between; font-size:.86rem; color:var(--muted); margin-top:6px;}
  .mmsg{font-size:.88rem; color:var(--lav); margin-top:6px; min-height:1.1em;}
  .stat{display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid var(--line);} .stat:last-child{border-bottom:none;}
  .prow{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 11px; background:var(--bg2); border-radius:10px; margin-bottom:6px;}
  .prow .pn{font-weight:600; color:#fff;} .prow .pr{font-size:.82rem; color:var(--muted);}
  .x{background:none; border:none; color:var(--muted); font-size:1.1rem; cursor:pointer;}
  .statusPill{padding:5px 12px; border-radius:20px; font-size:.78rem; font-weight:700; background:var(--card2); color:var(--gold);}

  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(8,6,18,.8); display:flex; align-items:flex-end; justify-content:center; z-index:50;}
  .sheet{background:var(--bg2); width:100%; max-width:560px; max-height:88vh; overflow-y:auto; border-radius:22px 22px 0 0; border:1px solid var(--line); padding:20px 18px 28px;}
  .sheet h2{font-family:Georgia,serif; color:#fff; font-size:1.5rem; margin-bottom:4px;}
  .sheet .close{position:sticky; top:0; float:right; background:var(--card2); border:1px solid var(--line); color:var(--lav); width:36px; height:36px; border-radius:50%; font-size:1.1rem; cursor:pointer;}
  .role-item{display:flex; gap:13px; padding:13px 0; border-bottom:1px solid var(--line);} .role-item:last-child{border-bottom:none;}
  .role-item .em{font-size:2rem; width:40px; text-align:center;}
  .role-item .rt{font-family:Georgia,serif; font-weight:bold; color:#fff; font-size:1.1rem;}
  .role-item .rd{font-size:.9rem; color:var(--lav); line-height:1.4; margin-top:2px;}
  .step{display:flex; gap:11px; margin-bottom:12px;}
  .step .n{flex:none; width:28px; height:28px; border-radius:50%; background:var(--purple); color:#15122b; font-weight:bold; display:flex; align-items:center; justify-content:center; font-family:Georgia,serif;}
  .step .t{font-size:.95rem; line-height:1.5;} .step .t b{color:#fff;}

  .toast{position:fixed; top:14px; left:50%; transform:translateX(-50%) translateY(-150%); background:var(--gold); color:#1a1530; font-weight:800; padding:11px 20px; border-radius:30px; z-index:80; transition:transform .35s; box-shadow:0 8px 24px rgba(0,0,0,.4); max-width:92%; text-align:center;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .footlink{position:fixed; bottom:12px; font-size:.8rem; color:#5f5a8f;} .footlink a{color:#7d77b8; cursor:pointer;}
</style>
</head>
<body>
<div class="wrap" id="app">

  <div id="needConfig" class="hidden">
    <span class="moon">🌙</span><h1>Werewolf Night</h1><div class="tag">Setup needed</div>
    <div class="card center"><p class="muted">This app needs its Firebase details filled in before it can run.</p></div>
  </div>

  <div id="joinScreen" class="hidden">
    <span class="moon">🌙</span><h1>Werewolf Night</h1><div class="tag">Scan • Join • Survive</div>
    <div class="card">
      <label for="nameInput">Your name</label>
      <input type="text" id="nameInput" maxlength="22" placeholder="e.g. Maide" autocomplete="off">
      <button class="btn primary" id="joinBtn" style="margin-top:14px;">Join the Village 🐺</button>
    </div>
    <div class="info-btns">
      <button onclick="openModal('roles')">🎭 Character Roles</button>
      <button onclick="openModal('rules')">📖 How to Play</button>
    </div>
  </div>

  <div id="adminLogin" class="hidden">
    <span class="moon">🎛️</span><h1>Host Login</h1><div class="tag">Admin access</div>
    <div class="card">
      <label for="pinInput">Host PIN</label>
      <input type="password" id="pinInput" inputmode="numeric" placeholder="••••" autocomplete="off">
      <button class="btn gold" id="pinBtn" style="margin-top:14px;">Enter</button>
    </div>
    <button class="btn ghost sm" onclick="go('join')">← Back</button>
  </div>

  <div id="playerStage" class="hidden"></div>
  <div id="adminDash" class="hidden"></div>

</div>

<div class="toast" id="toast"></div>
<div class="footlink" id="footlink"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* ===================== CONFIG ===================== */
const CONFIG = {
  firebase: {
    apiKey: "AIzaSyCM2qYbDUXNMnJfTrs3n6QeNW6I_KKW684",
    authDomain: "werewolf-night-e8d16.firebaseapp.com",
    databaseURL: "https://werewolf-night-e8d16-default-rtdb.firebaseio.com",
    projectId: "werewolf-night-e8d16",
    appId: "1:503393016321:web:3f72843ead5b78fce1fe00"
  },
  hostPin: "2611",
  durations: { tables:30, roles:15, wolves:20, seer:12, doctor:12, morning:6, discuss:60, vote:22, verdict:5 }, // seconds
  gameCapMin: 30
};

/* ===================== ROLES ===================== */
const ROLES = {
  villager:{name:"Villager", em:"🧑‍🌾", team:"Village", color:"var(--teal)", desc:"No night powers — but your vote and your read on people are the village's weapon. Find the wolves by day."},
  wolf:{name:"Werewolf", em:"🐺", team:"Wolves", color:"var(--red)", desc:"Each night you and your pack secretly pick one player to eat. By day, lie low and act innocent."},
  seer:{name:"Seer", em:"👁️", team:"Village", color:"var(--teal)", desc:"Each night you inspect one player and instantly learn if they're a Werewolf. Guide the village without blowing your cover."},
  doctor:{name:"Doctor", em:"💉", team:"Village", color:"var(--teal)", desc:"Each night you protect one player (even yourself). If the wolves attack them, they survive."},
  jester:{name:"Jester", em:"🤡", team:"Solo", color:"var(--gold)", desc:"You win all by yourself if the village VOTES YOU OUT. Act guilty on purpose and trick them into eliminating you!"}
};
const AUTO_ROLES = ["wolf","seer","doctor","jester","villager"];

/* ===================== STATE ===================== */
let db=null,S=null,me={id:null,name:null},session=null,isAdmin=false,screen="join";
let lastAdvance={}, wakeLock=null;
const $=id=>document.getElementById(id);
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove("show"),2500);}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function rand(n){return Math.random()*n|0;}
function topKey(o){let best=null,bv=-1,ties=[];for(const k in o){if(o[k]>bv){bv=o[k];ties=[k];}else if(o[k]===bv)ties.push(k);}return ties.length?ties[rand(ties.length)]:null;}
function firstVal(o){if(!o)return null;const k=Object.keys(o);return k.length?o[k[0]]:null;}

/* ===================== SCREENS ===================== */
const SCREENS=["needConfig","joinScreen","adminLogin","playerStage","adminDash"];
function show(id){SCREENS.forEach(s=>$(s).classList.toggle("hidden",s!==id));}
function go(s){screen=s;
  if(s==="join")show("joinScreen");
  else if(s==="adminLogin")show("adminLogin");
  else if(s==="player")show("playerStage");
  else if(s==="admin")show("adminDash");
}

/* ===================== INIT ===================== */
function init(){
  if(CONFIG.firebase.apiKey.startsWith("PASTE")){show("needConfig");return;}
  firebase.initializeApp(CONFIG.firebase); db=firebase.database(); S=db.ref("session");
  me.id=localStorage.getItem("wn_id"); if(!me.id){me.id="p"+Math.random().toString(36).slice(2,10);localStorage.setItem("wn_id",me.id);}
  me.name=localStorage.getItem("wn_name")||null;
  S.on("value",snap=>{session=snap.val()||{status:"lobby",game:0,players:{}};render();});
  const adminMode=location.hash.toLowerCase().includes("admin");
  $("footlink").innerHTML=adminMode?"":'<a onclick="go(\'adminLogin\')">Host? Tap here</a>';
  if(adminMode)go("adminLogin"); else if(me.name)go("player"); else go("join");
  setInterval(tick,1000);
}
function tick(){ if(isAdmin)engineTick(); updateClocks(); }
function updateClocks(){
  const now=Date.now();
  document.querySelectorAll("[data-ends]").forEach(el=>{
    const ms=+el.getAttribute("data-ends")-now; const s=Math.max(0,Math.ceil(ms/1000));
    el.textContent=fmt(s); el.classList.toggle("low",s<=10);
  });
}
function fmt(s){const m=Math.floor(s/60),x=s%60;return m>0?m+":"+String(x).padStart(2,"0"):String(s);}

/* ===================== RENDER ROUTER ===================== */
function render(){
  if(!session)return;
  if(isAdmin){renderAdmin();return;}
  if(screen==="adminLogin")return;
  const p=session.players&&session.players[me.id];
  if(!me.name||!p){if(screen!=="join")go("join");return;}
  if(screen!=="player")go("player");
  renderPlayer(p);
}

/* ===================== JOIN ===================== */
$("joinBtn").onclick=()=>{const n=$("nameInput").value.trim();if(!n){toast("Type your name");return;}
  me.name=n;localStorage.setItem("wn_name",n);S.child("players/"+me.id).update({name:n,joinedAt:Date.now()});go("player");toast("You're in, "+n+"! 🐺");};
$("nameInput").addEventListener("keydown",e=>{if(e.key==="Enter")$("joinBtn").click();});

/* ===================== PLAYER VIEW ===================== */
function countPlayers(){return session.players?Object.keys(session.players).length:0;}
function tierName(i){return["Bronze","Silver","Gold"][i]||"—";}
function tierColor(i){return["var(--bronze-t)","var(--silver-t)","var(--gold-t)"][i]||"var(--muted)";}
function tierEmoji(i){return["🥉","🥈","🥇"][i]||"";}
function tierBadge(i){return'<span class="tier-badge" style="border-color:'+tierColor(i)+';color:'+tierColor(i)+'">'+tierEmoji(i)+' '+tierName(i)+' Table</span>';}
function aliveAtArr(tk){const ps=session.players||{};return Object.keys(ps).filter(id=>ps[id].table===tk&&ps[id].alive);}

function renderPlayer(p){
  const el=$("playerStage"); const st=session.status;
  if(st!=="running"||p.role==null){
    el.innerHTML='<span class="moon">🌙</span><h1>You\'re in, '+esc(me.name)+'!</h1>'
      +'<div class="tag">'+(st==="finished"?"Event finished":"Waiting for the host")+'</div>'
      +'<div class="card center"><p class="muted">'+(st==="finished"?"Thanks for playing! 🐺":("The host will start soon — keep this page open!<br><br><b>"+countPlayers()+"</b> players joined."))+'</p></div>'
      +infoBtns(); return;
  }
  const tk=p.table, T=session.tables&&session.tables[tk];
  if(!T){el.innerHTML='<div class="card center"><p class="muted">Loading…</p></div>';return;}
  if(T.phase==="ended"){renderGameOver(el,p,T);return;}
  if(!p.alive){renderDead(el,p,T);return;}
  renderPhase(el,p,T);
}

function infoBtns(){return'<div class="info-btns" style="margin-top:12px"><button onclick="openModal(\'roles\')">🎭 Roles</button><button onclick="openModal(\'rules\')">📖 How to Play</button></div>'
  +'<p style="text-align:center;font-size:.82rem;color:var(--muted);margin-top:14px;line-height:1.5;border-top:1px solid var(--line);padding-top:12px">🤫 <b style="color:var(--lav)">Keep it calm.</b> No shouting or talking over each other — listen to your table\'s narrator, and never show your screen.</p>';}
function clockHTML(T){return'<div class="clock"><span>⏱</span><span data-ends="'+T.phaseEndsAt+'">'+fmt(Math.max(0,Math.ceil((T.phaseEndsAt-Date.now())/1000)))+'</span></div>';}
function isNight(ph){return ph==="wolves"||ph==="seer"||ph==="doctor";}

function renderPhase(el,p,T){
  const ph=T.phase, ps=session.players, alive=aliveAtArr(p.table);
  if(ph==="tables"){
    const mates=aliveAtArr(p.table).map(id=>ps[id].name);
    el.innerHTML='<div class="phase-head"><div class="phase-kicker" style="color:'+tierColor(p.table)+'">🚶 Find your table</div></div>'
      +'<div class="card" style="text-align:center;border:2px solid '+tierColor(p.table)+';padding:24px 18px">'
        +'<div style="font-size:3.6rem;line-height:1">'+tierEmoji(p.table)+'</div>'
        +'<div style="font-family:Georgia,serif;color:#fff;font-size:1.9rem;font-weight:bold;margin:4px 0 12px">'+tierName(p.table)+' Table</div>'
        +'<p class="muted">Walk to the <b style="color:#fff">'+tierName(p.table)+'</b> area and sit with your group:</p>'
        +'<div style="margin-top:10px;line-height:2">'+mates.map(n=>'<span class="pill" style="background:var(--card2);color:#fff;margin:3px;display:inline-block">'+esc(n)+'</span>').join(' ')+'</div>'
      +'</div>'
      +'<div class="center">'+clockHTML(T)+'</div>'
      +'<p class="picktip" style="margin-top:10px">Your secret role appears once everyone is seated.</p>'
      +infoBtns();
    return;
  }
  if(ph==="roles"){
    const role=ROLES[p.role];
    el.innerHTML='<div class="phase-head"><div class="phase-kicker" style="color:var(--purple)">🎭 Game '+(session.game||1)+' — Your Secret Role</div></div>'
      +'<div class="card" style="border:2px solid '+role.color+';text-align:center;padding:26px 18px">'
        +'<div style="font-size:4.4rem;line-height:1">'+role.em+'</div>'
        +'<div style="font-family:Georgia,serif;color:#fff;font-size:2rem;font-weight:bold;margin:6px 0 8px">'+role.name+'</div>'
        +'<div style="margin-bottom:14px"><span class="pill" style="background:'+role.color+';color:#15122b">'+role.team+'</span></div>'
        +'<div style="font-size:1.05rem;line-height:1.55;color:var(--lav)">'+role.desc+'</div>'
      +'</div>'
      +'<div class="center">'+clockHTML(T)+'</div>'
      +'<p class="picktip" style="margin-top:10px">🤫 Memorize it — night falls when the timer ends. Never show your screen!</p>'
      +infoBtns();
    return;
  }
  const cls=isNight(ph)?"night":"day";
  let head='<div class="phase-head '+cls+'">';
  if(isNight(ph)) head+='<div class="phase-kicker" style="color:#8d86ff">🌙 Night '+(T.night||1)+'</div>';
  else head+='<div class="phase-kicker" style="color:var(--gold)">☀️ Day '+(T.night||1)+'</div>';

  // determine if THIS player acts this phase
  const myActs=(ph==="wolves"&&p.role==="wolf")||(ph==="seer"&&p.role==="seer")||(ph==="doctor"&&p.role==="doctor")||(ph==="vote");
  let body="";

  if(ph==="wolves"){
    if(p.role==="wolf"){
      head+='<div class="phase-title">Choose your prey</div>'+clockHTML(T)+'</div>';
      const pack=Object.keys(ps).filter(id=>ps[id].table===p.table&&ps[id].role==="wolf"&&ps[id].alive).map(id=>esc(ps[id].name));
      body='<div class="pack">🐺 Your pack: '+pack.join(", ")+'</div>';
      const targets=alive.filter(id=>ps[id].role!=="wolf");
      body+=pickList(p.table,targets,T,true);

function phaseLabel(ph){return{tables:"🚶 Finding tables",roles:"🎭 Role reveal",wolves:"🐺 Wolves choosing a victim",seer:"👁️ Seer inspecting",doctor:"💉 Doctor protecting",morning:"🌅 Morning reveal",discuss:"🗣️ Discussion",vote:"🗳️ Voting",verdict:"⚖️ Verdict",ended:"✅ Game over"}[ph]||ph;}

function kick(id){if(confirm("Remove this player?"))S.child("players/"+id).remove();}
function resetAll(){if(confirm("Reset everything (players + games)?"))S.set({status:"lobby",game:0,players:{}});}
function endEvent(){if(confirm("End the whole event?"))S.child("status").set("finished");}

/* ===================== ROLE/TABLE ASSIGNMENT ===================== */
function rolesFor(n){const r=[];const w=Math.max(1,Math.round(n/4));for(let i=0;i<w;i++)r.push("wolf");r.push("seer");if(n>=5)r.push("doctor");if(n>=7)r.push("jester");while(r.length<n)r.push("villager");if(r.length>n)r.length=n;return r;}
function balancedCounts(n){const b=Math.floor(n/3),e=n%3,c=[b,b,b];for(let i=0;i<e;i++)c[2-i]++;return c;}
function balancedTiers(n){const c=balancedCounts(n),arr=[];c.forEach((x,t)=>{for(let i=0;i<x;i++)arr.push(t);});return shuffle(arr);}
function freshTable(now){return{phase:"tables",night:1,phaseEndsAt:now+CONFIG.durations.tables*1000,gameEndsAt:now+(CONFIG.gameCapMin*60+CONFIG.durations.tables+CONFIG.durations.roles)*1000,winner:null,msg:"",endMsg:null,act:null,pendingVictim:null};}

function startGame(){
  const ps=session.players||{}; const ids=shuffle(Object.keys(ps)); const tiers=balancedTiers(ids.length);
  const up={}; const byTier=[[],[],[]]; ids.forEach((id,i)=>byTier[tiers[i]].push(id));
  byTier.forEach((g,t)=>{const roles=shuffle(rolesFor(g.length));g.forEach((id,i)=>{up["players/"+id+"/table"]=t;up["players/"+id+"/role"]=roles[i];up["players/"+id+"/alive"]=true;up["players/"+id+"/outOrder"]=null;up["players/"+id+"/seerResult"]=null;});});
  const now=Date.now(); [0,1,2].forEach(t=>up["tables/"+t]=freshTable(now));
  up["status"]="running"; up["game"]=1; S.update(up); requestWake(); toast("Game 1 started 🐺");
}

function nextRound(){
  if(!allEnded())return; const ps=session.players||{}; const ids=Object.keys(ps); const desired={};
  ids.forEach(id=>desired[id]=ps[id].table||0);
  [0,1,2].forEach(tk=>{
    const T=session.tables[tk],winner=T.winner; const tp=ids.filter(id=>ps[id].table===tk);
    const winners=tp.filter(id=>winner==="wolves"?ps[id].role==="wolf":winner==="jester"?ps[id].role==="jester":(ps[id].role!=="wolf"&&ps[id].role!=="jester"));
    const upC=winners.filter(id=>ps[id].alive).slice(0,2);
    const outs=tp.filter(id=>ps[id].outOrder!=null&&!upC.includes(id)).sort((a,b)=>ps[a].outOrder-ps[b].outOrder).slice(0,2);
    upC.forEach(id=>desired[id]=Math.min(2,(ps[id].table||0)+1));
    outs.forEach(id=>desired[id]=Math.max(0,(ps[id].table||0)-1));
  });
  rebalance(ids,desired);
  const up={}; const byTier=[[],[],[]]; ids.forEach(id=>byTier[desired[id]].push(id));
  byTier.forEach((g,t)=>{const roles=shuffle(rolesFor(g.length));g.forEach((id,i)=>{up["players/"+id+"/table"]=t;up["players/"+id+"/role"]=roles[i];up["players/"+id+"/alive"]=true;up["players/"+id+"/outOrder"]=null;up["players/"+id+"/seerResult"]=null;});});
  const now=Date.now(); [0,1,2].forEach(t=>up["tables/"+t]=freshTable(now));
  up["game"]=(session.game||1)+1; S.update(up); requestWake(); toast("Round "+up["game"]+" — reshuffled!");
}
function rebalance(ids,desired){const target=balancedCounts(ids.length);let g=0;while(g++<300){const c=[0,0,0];ids.forEach(id=>c[desired[id]]++);let over=-1,under=-1;for(let t=0;t<3;t++)if(c[t]>target[t])over=t;for(let t=0;t<3;t++)if(c[t]<target[t])under=t;if(over<0||under<0)break;const step=under>over?1:-1;const m=ids.filter(id=>desired[id]===over);if(!m.length)break;desired[m[rand(m.length)]]=over+step;}}
function allEnded(){return session.tables&&[0,1,2].every(t=>session.tables[t]&&session.tables[t].phase==="ended");}

/* ===================== ENGINE (host only) ===================== */
function engineTick(){
  if(!session||session.status!=="running"||!session.tables)return;
  const now=Date.now(),ps=session.players||{};
  ["0","1","2"].forEach(tk=>{
    const T=session.tables[tk]; if(!T||T.phase==="ended")return;
    if(now-(lastAdvance[tk]||0)<1400)return;             // debounce while update propagates
    if(now>=T.gameEndsAt){const up={};endTable(up,tk,"wolves","⏰ Time's up! The Wolves win by default.");commit(tk,up);return;}
    const needed=requiredActors(tk); const acted=T.act?Object.keys(T.act).filter(id=>ps[id]&&ps[id].alive&&ps[id].table===+tk):[];
    const allActed=needed.length>0&&needed.every(p=>acted.includes(p));
    if(now>=T.phaseEndsAt||allActed){lastAdvance[tk]=now;advanceTable(tk);}
  });
}
function commit(tk,up){lastAdvance[tk]=Date.now();S.update(up);}
function requiredActors(tk){
  const T=session.tables[tk],ps=session.players||{}; const al=Object.keys(ps).filter(id=>ps[id].table===+tk&&ps[id].alive);
  if(T.phase==="wolves")return al.filter(id=>ps[id].role==="wolf");
  if(T.phase==="seer")return al.filter(id=>ps[id].role==="seer");
  if(T.phase==="doctor")return al.filter(id=>ps[id].role==="doctor");
  if(T.phase==="vote")return al;
  return [];
}
function aliveIds(tk){const ps=session.players||{};return Object.keys(ps).filter(id=>ps[id].table===+tk&&ps[id].alive);}
function roleAlive(tk,role){const ps=session.players;return aliveIds(tk).some(id=>ps[id].role===role);}
function nextOut(tk){const ps=session.players;let mx=0;Object.keys(ps).forEach(id=>{if(ps[id].table===+tk&&ps[id].outOrder>mx)mx=ps[id].outOrder;});return mx+1;}

function advanceTable(tk){
  const T=session.tables[tk],ps=session.players,now=Date.now(),up={},D=CONFIG.durations;
  const setPh=(name,secs)=>{up["tables/"+tk+"/phase"]=name;up["tables/"+tk+"/phaseEndsAt"]=now+secs*1000;up["tables/"+tk+"/act"]=null;};
  const ph=T.phase;
  if(ph==="tables"){
    setPh("roles",D.roles);
  } else if(ph==="roles"){
    setPh("wolves",D.wolves);
  } else if(ph==="wolves"){
    const votes=T.act||{},tally={};
    Object.entries(votes).forEach(([w,t])=>{if(t&&ps[w]&&ps[w].alive&&ps[w].role==="wolf"&&ps[w].table===+tk)tally[t]=(tally[t]||0)+1;});
    let victim=topKey(tally);
    if(!victim){const tg=aliveIds(tk).filter(id=>ps[id].role!=="wolf");victim=tg.length?tg[rand(tg.length)]:null;}
    up["tables/"+tk+"/pendingVictim"]=victim||null;
    if(roleAlive(tk,"seer"))setPh("seer",D.seer);
    else if(roleAlive(tk,"doctor"))setPh("doctor",D.doctor);
    else resolveNight(tk,up,now,null,victim);
  } else if(ph==="seer"){
    if(roleAlive(tk,"doctor"))setPh("doctor",D.doctor); else resolveNight(tk,up,now,null);
  } else if(ph==="doctor"){
    resolveNight(tk,up,now,firstVal(T.act));
  } else if(ph==="morning"){
    setPh("discuss",D.discuss);
  } else if(ph==="discuss"){
    setPh("vote",D.vote);
  } else if(ph==="vote"){
    resolveDay(tk,up,now);
  } else if(ph==="verdict"){
    up["tables/"+tk+"/night"]=(T.night||1)+1; setPh("wolves",D.wolves);
  }
  S.update(up);
}
function resolveNight(tk,up,now,protect,victimArg){
  const T=session.tables[tk],ps=session.players,D=CONFIG.durations;
  const victim=(victimArg!==undefined)?victimArg:T.pendingVictim; const aliveClone={}; aliveIds(tk).forEach(id=>aliveClone[id]=true);
  let died=null;
  if(victim&&victim!==protect){died=victim;up["players/"+victim+"/alive"]=false;up["players/"+victim+"/outOrder"]=nextOut(tk);delete aliveClone[victim];}
  up["tables/"+tk+"/pendingVictim"]=null; up["tables/"+tk+"/act"]=null;
  up["tables/"+tk+"/msg"]=died?(ps[died].name+" was eaten overnight — they were a "+ROLES[ps[died].role].name+" "+ROLES[ps[died].role].em+"."):"A peaceful night — everyone survived.";
  const w=winState(aliveClone,ps);
  if(w){endTable(up,tk,w);} else {up["tables/"+tk+"/phase"]="morning";up["tables/"+tk+"/phaseEndsAt"]=now+D.morning*1000;}
}
function resolveDay(tk,up,now){
  const T=session.tables[tk],ps=session.players,D=CONFIG.durations;
  const votes=T.act||{},tally={};
  Object.entries(votes).forEach(([v,t])=>{if(t&&ps[v]&&ps[v].alive&&ps[v].table===+tk)tally[t]=(tally[t]||0)+1;});
  const out=topKey(tally); const aliveClone={}; aliveIds(tk).forEach(id=>aliveClone[id]=true);
  up["tables/"+tk+"/act"]=null;
  if(out){
    up["players/"+out+"/alive"]=false; up["players/"+out+"/outOrder"]=nextOut(tk); delete aliveClone[out];
    const role=ps[out].role;
    up["tables/"+tk+"/msg"]="The village voted out "+ps[out].name+" — they were a "+ROLES[role].name+" "+ROLES[role].em+".";
    if(role==="jester"){endTable(up,tk,"jester");return;}
  } else { up["tables/"+tk+"/msg"]="No majority — nobody was eliminated."; }
  const w=winState(aliveClone,ps);
  if(w){endTable(up,tk,w);} else {up["tables/"+tk+"/phase"]="verdict";up["tables/"+tk+"/phaseEndsAt"]=now+D.verdict*1000;}
}
function winState(aliveClone,ps){let wolves=0,others=0;Object.keys(aliveClone).forEach(id=>{if(ps[id].role==="wolf")wolves++;else others++;});if(wolves===0)return"village";if(wolves>=others)return"wolves";return null;}
function endTable(up,tk,winner,customMsg){
  up["tables/"+tk+"/phase"]="ended"; up["tables/"+tk+"/winner"]=winner; up["tables/"+tk+"/phaseEndsAt"]=Date.now(); up["tables/"+tk+"/act"]=null; up["tables/"+tk+"/pendingVictim"]=null;
  up["tables/"+tk+"/endMsg"]=customMsg||(winner==="village"?"🎉 The Village wins — all wolves are gone!":winner==="wolves"?"🐺 The Wolves win!":"🤡 The Jester wins — voted out on purpose!");
}

    inner+='<h2>📖 How to Play</h2><p class="muted" style="margin-bottom:14px">The app is your narrator — it runs every phase and timer. Just follow your phone, and <b style="color:#fff">never show your screen to anyone</b>.</p>'
      +step(1,"<b>Get your secret role</b> when the host starts. Memorize it — don't show it!")
      +step(2,"<b>Night 🌙</b> — the app wakes each role in turn. If it's your turn (Wolf / Seer / Doctor) you'll tap your choice. Everyone else: eyes closed, just wait.")
      +step(3,"<b>Morning ☀️</b> — the app reveals who the wolves ate.")
      +step(4,"<b>Discuss</b> — talk it out at your table: who seems like a wolf?")
      +step(5,"<b>Vote 🗳️</b> — everyone taps who to eliminate. The app counts the votes and removes the loser.")
      +step(6,"<b>Win</b> — Village wins when all wolves are gone. Wolves win when they match the villagers. The 🤡 Jester wins if YOU vote them out! If 30 min runs out, the wolves win.")
      +'<h2 style="font-size:1.25rem;margin-top:16px">🏆 The Table Ladder</h2><p class="muted" style="margin-top:6px">Three tables — 🥇 Gold, 🥈 Silver, 🥉 Bronze. After each round, winners who survived move <b>up</b>, first-out players move <b>down</b> — all automatic. Climb to the Gold table to rule the night!</p>';
  }
  o.innerHTML=inner+'</div>';document.body.appendChild(o);
}
function step(n,t){return'<div class="step"><div class="n">'+n+'</div><div class="t">'+t+'</div></div>';}

init();
</script>
</body>
</html>
